<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lantern Isle: Guardian Star</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script async src="https://vibej.am/2026/widget.js"></script>
  <style>
    /* ── Soft Watercolor Theme ── */
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#1a1228;overflow:hidden;font-family:'Quicksand',sans-serif;width:100vw;height:100vh;}
    canvas{display:block;}
    #ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}

    /* ── Crystal Status Bar ── */
    #hud-crystals{
      position:absolute;top:14px;left:14px;display:flex;align-items:center;gap:5px;
      background:rgba(255,240,248,0.82);border:1.5px solid rgba(255,180,210,0.5);
      border-radius:24px;padding:6px 13px 6px 10px;pointer-events:auto;
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      box-shadow:0 2px 12px rgba(220,140,180,0.18);
    }
    .gem{width:18px;height:18px;display:flex;align-items:center;justify-content:center;opacity:0.25;transition:opacity 0.35s,filter 0.35s;}
    .gem.lit{opacity:1;filter:drop-shadow(0 0 5px rgba(180,120,200,0.8));}
    .gem svg{width:100%;height:100%;}
    #crystal-label{font-size:11px;font-weight:700;color:#9B6AB0;margin-left:5px;letter-spacing:0.3px;}

    /* ── HUD Buttons (sound + map) ── */
    .hud-btn{
      position:absolute;top:14px;
      background:rgba(255,240,248,0.82);border:1.5px solid rgba(255,180,210,0.5);
      border-radius:20px;padding:6px 14px;cursor:pointer;pointer-events:auto;
      display:flex;align-items:center;gap:6px;
      font-family:'Quicksand',sans-serif;font-size:12px;font-weight:700;color:#9B6AB0;
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      box-shadow:0 2px 12px rgba(220,140,180,0.18);
      transition:background 0.2s,box-shadow 0.2s;
    }
    .hud-btn:hover{background:rgba(255,228,242,0.95);box-shadow:0 4px 18px rgba(220,140,180,0.3);}
    .hud-btn svg{flex-shrink:0;}
    #sound-toggle{right:14px;}
    #map-btn{left:50%;transform:translateX(-50%);}
    #hud-compass{display:none!important;}

    /* ── Inventory ── */
    #inventory{position:absolute;right:14px;top:50%;transform:translateY(-50%);
      display:flex;flex-direction:column;gap:6px;pointer-events:auto;}
    .inv-slot{width:44px;height:44px;
      background:rgba(255,240,248,0.82);border:1.5px solid rgba(255,180,210,0.5);
      border-radius:14px;display:flex;align-items:center;justify-content:center;
      backdrop-filter:blur(10px);box-shadow:0 2px 10px rgba(220,140,180,0.15);}
    .inv-slot svg{width:24px;height:24px;}

    /* ── Quest Tracker ── */
    #quest-tracker{position:absolute;left:14px;top:50%;transform:translateY(-50%);
      background:rgba(255,240,248,0.85);border:1.5px solid rgba(255,180,210,0.45);
      border-radius:18px;padding:11px 15px;min-width:150px;max-width:200px;
      display:none;pointer-events:none;
      backdrop-filter:blur(10px);box-shadow:0 4px 18px rgba(220,140,180,0.2);}
    #quest-tracker h4{font-size:10px;font-weight:700;color:#C4709A;text-transform:uppercase;
      letter-spacing:0.8px;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
    #quest-tracker ul{list-style:none;padding:0;margin:0;}
    #quest-tracker li{font-size:11px;color:#7A5A7A;font-weight:600;padding:3px 0;
      display:flex;align-items:center;gap:5px;}
    #quest-tracker li::before{content:'';width:5px;height:5px;border-radius:50%;background:#D4A0C0;flex-shrink:0;}
    #quest-tracker li.done{opacity:0.38;text-decoration:line-through;}
    #quest-tracker li.done::before{background:#D4B8C8;}

    /* ── Dialogue Box ── */
    #dialogue-box{
      position:absolute;bottom:0;left:0;width:100%;
      background:rgba(255,242,250,0.94);border-top:2px solid rgba(255,180,210,0.5);
      display:none;pointer-events:auto;
      padding:0 0 16px 0;
      backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      box-shadow:0 -4px 24px rgba(220,140,180,0.18);
    }
    #dialogue-header{
      display:flex;align-items:center;gap:8px;
      padding:10px 18px 8px 18px;
      border-bottom:1px solid rgba(255,180,210,0.25);
    }
    #dialogue-speaker-icon{
      width:28px;height:28px;border-radius:50%;
      background:rgba(255,210,230,0.6);border:1.5px solid rgba(255,180,210,0.6);
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    #dialogue-speaker-icon svg{width:15px;height:15px;}
    #dialogue-speaker{
      font-size:12px;font-weight:700;color:#C4709A;letter-spacing:0.3px;
    }
    #dialogue-body{
      padding:12px 48px 4px 18px;
      font-size:15px;line-height:1.7;color:#5C3D5E;
    }
    #dialogue-continue{
      position:absolute;bottom:14px;right:18px;
      width:22px;height:22px;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;animation:bob 0.65s ease-in-out infinite alternate;
    }
    #dialogue-continue svg{width:14px;height:14px;}
    @keyframes bob{from{transform:translateY(0)}to{transform:translateY(4px)}}

    /* ── Ability Bar ── */
    #ability-bar{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
      display:flex;gap:8px;pointer-events:none;}
    .ability-slot{
      width:40px;height:40px;
      background:rgba(255,240,248,0.82);border:1.5px solid rgba(255,180,210,0.5);
      border-radius:12px;display:flex;align-items:center;justify-content:center;
      position:relative;overflow:hidden;
      backdrop-filter:blur(10px);box-shadow:0 2px 10px rgba(220,140,180,0.18);
    }
    .ability-slot svg{width:20px;height:20px;position:relative;z-index:1;}
    .ability-key{
      position:absolute;bottom:2px;right:3px;font-size:8px;font-weight:700;
      color:rgba(155,106,176,0.7);z-index:2;
    }
    .ability-cooldown{position:absolute;inset:0;background:rgba(220,170,210,0.45);
      border-radius:11px;transform-origin:bottom;transition:transform 0.1s;}

    /* ── Map Screen ── */
    #map-screen{position:absolute;inset:0;
      background:rgba(255,235,248,0.92);
      display:none;flex-direction:column;align-items:center;justify-content:center;
      pointer-events:auto;z-index:20;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);}
    #map-title{
      font-size:22px;font-weight:700;color:#7A3D6A;margin-bottom:16px;
      letter-spacing:0.3px;display:flex;align-items:center;gap:8px;
    }
    #map-title svg{width:20px;height:20px;}
    #map-canvas{
      border:2px solid rgba(255,180,210,0.55);border-radius:20px;
      background:#f9eef5;
      box-shadow:0 8px 32px rgba(200,120,170,0.22);
    }
    #close-map{
      margin-top:14px;background:rgba(255,210,230,0.7);color:#7A3D6A;
      border:1.5px solid rgba(255,180,210,0.6);
      font-family:'Quicksand',sans-serif;font-size:14px;font-weight:700;
      padding:8px 28px;border-radius:20px;cursor:pointer;pointer-events:auto;
      box-shadow:0 2px 10px rgba(220,140,180,0.2);
      transition:background 0.2s,box-shadow 0.2s;
    }
    #close-map:hover{background:rgba(255,200,225,0.9);box-shadow:0 4px 16px rgba(220,140,180,0.35);}

    /* ── Title Screen ── */
    #title-screen{position:absolute;inset:0;
      background:linear-gradient(160deg,#fce8f5 0%,#f5d6ee 30%,#e8c8e8 60%,#d4b8e0 100%);
      transition:opacity 0.35s ease;display:flex;flex-direction:column;align-items:center;
      justify-content:center;z-index:30;pointer-events:auto;overflow:hidden;}
    /* Soft watercolor blobs */
    #title-screen::before{
      content:'';position:absolute;inset:0;pointer-events:none;
      background:
        radial-gradient(ellipse 60% 45% at 20% 30%, rgba(255,200,230,0.55) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(200,180,240,0.45) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 60% 20%, rgba(255,220,200,0.35) 0%, transparent 70%);
    }
    #title-lantern{
      position:relative;z-index:1;
      width:72px;height:72px;margin-bottom:12px;
      animation:lanternFloat 2.5s ease-in-out infinite alternate;
      filter:drop-shadow(0 0 18px rgba(235,178,26,0.7)) drop-shadow(0 4px 12px rgba(200,100,120,0.3));
    }
    @keyframes lanternFloat{from{transform:translateY(0) rotate(-4deg)}to{transform:translateY(-12px) rotate(4deg)}}
    #title-screen h1{
      position:relative;z-index:1;
      font-size:40px;font-weight:700;
      color:#5C2D5A;text-align:center;line-height:1.2;
      text-shadow:0 2px 18px rgba(200,120,180,0.35),0 1px 4px rgba(255,255,255,0.6);
    }
    #title-tagline{
      position:relative;z-index:1;
      color:#C4709A;font-size:13px;margin-top:8px;font-weight:600;
      letter-spacing:2px;text-transform:uppercase;opacity:0.9;
    }
    #title-screen p{
      position:relative;z-index:1;
      color:#7A5A7A;font-size:14px;margin-top:12px;opacity:0.9;
      max-width:300px;text-align:center;line-height:1.7;
    }
    #start-btn{
      position:relative;z-index:1;
      margin-top:28px;
      background:linear-gradient(135deg,rgba(255,190,220,0.95),rgba(220,160,210,0.95));
      color:#5C2D5A;border:1.5px solid rgba(255,180,210,0.7);
      font-family:'Quicksand',sans-serif;font-size:16px;font-weight:700;
      padding:13px 42px;border-radius:28px;cursor:pointer;
      box-shadow:0 4px 22px rgba(220,140,180,0.4),0 1px 4px rgba(255,255,255,0.5) inset;
      transition:transform 0.15s,box-shadow 0.15s;
    }
    #start-btn:hover{transform:scale(1.05);box-shadow:0 6px 30px rgba(220,140,180,0.58);}
    #reset-btn{
      position:relative;z-index:1;
      margin-top:10px;background:transparent;color:#B890B0;
      border:1.5px solid rgba(200,160,200,0.4);
      font-family:'Quicksand',sans-serif;font-size:12px;font-weight:600;
      padding:6px 20px;border-radius:20px;cursor:pointer;opacity:0.75;
    }
    #reset-btn:hover{opacity:1;background:rgba(255,210,230,0.3);}
    #dev-btn{
      position:relative;z-index:1;
      margin-top:6px;background:transparent;color:#C4A0C0;
      border:1.5px dashed rgba(200,160,200,0.35);
      font-family:'Quicksand',sans-serif;font-size:11px;font-weight:600;
      padding:5px 14px;border-radius:14px;cursor:pointer;opacity:0.45;
    }
    #dev-btn:hover{opacity:1;}

    /* ── Island Banner ── */
    #island-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.88);
      background:rgba(255,242,250,0.94);border:1.5px solid rgba(255,180,210,0.55);
      border-radius:22px;padding:16px 38px;text-align:center;pointer-events:none;z-index:36;
      opacity:0;transition:opacity 0.3s ease,transform 0.3s ease;
      box-shadow:0 8px 32px rgba(220,140,180,0.28);backdrop-filter:blur(14px);}
    #island-banner.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
    #island-banner h2{font-size:24px;font-weight:700;color:#5C2D5A;margin:0;}
    #island-banner p{font-size:12px;color:#C4709A;font-weight:600;margin-top:5px;letter-spacing:0.5px;}

    /* ── Interact Prompt ── */
    #interact-prompt{
      position:absolute;display:none;pointer-events:none;
      background:rgba(255,240,248,0.9);color:#7A5A7A;
      font-family:'Quicksand',sans-serif;font-size:11px;font-weight:700;
      padding:4px 10px 4px 8px;border-radius:20px;
      border:1.5px solid rgba(255,180,210,0.5);white-space:nowrap;
      transform:translate(-50%,-100%);
      box-shadow:0 2px 12px rgba(220,140,180,0.22);letter-spacing:0.2px;
      display:flex;align-items:center;gap:5px;
      animation:promptbob 0.8s ease-in-out infinite alternate;
      backdrop-filter:blur(8px);
    }
    #interact-key{
      background:rgba(255,200,225,0.7);border:1px solid rgba(255,180,210,0.6);
      border-radius:6px;padding:1px 5px;font-size:10px;font-weight:700;color:#C4709A;
    }
    @keyframes promptbob{from{transform:translate(-50%,-100%) translateY(0)}to{transform:translate(-50%,-100%) translateY(-3px)}}

    /* ── Win Screen ── */
    #win-screen{position:absolute;inset:0;
      background:linear-gradient(160deg,#fce8f5 0%,#e8d0f0 50%,#d4b8e4 100%);
      display:none;flex-direction:column;align-items:center;justify-content:center;
      z-index:40;pointer-events:auto;overflow:hidden;}
    #win-stars{position:absolute;inset:0;pointer-events:none;}
    #win-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;
      padding:20px;text-align:center;}
    #win-screen h1{font-size:34px;font-weight:700;color:#5C2D5A;text-align:center;
      text-shadow:0 0 28px rgba(220,140,200,0.5),0 2px 6px rgba(255,255,255,0.4);line-height:1.35;}
    #win-screen p{color:#7A5A7A;margin-top:14px;font-size:15px;max-width:440px;line-height:1.85;}
    #restart-btn{margin-top:28px;
      background:linear-gradient(135deg,rgba(255,190,220,0.95),rgba(220,160,210,0.95));
      color:#5C2D5A;border:1.5px solid rgba(255,180,210,0.7);
      font-family:'Quicksand',sans-serif;font-size:16px;font-weight:700;
      padding:12px 36px;border-radius:28px;cursor:pointer;
      box-shadow:0 4px 20px rgba(220,140,180,0.4);}
    #restart-btn:hover{transform:scale(1.05);}

    /* ── Misc ── */
    #restore-flash{position:fixed;inset:0;background:white;opacity:0;pointer-events:none;z-index:45;
      transition:opacity 0.12s ease;}
    #grain{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0.04;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:200px 200px;}
    #transition-overlay{position:fixed;inset:0;background:#f0e0f0;opacity:0;pointer-events:none;
      z-index:35;transition:opacity 0.35s ease;}
    .thought-bubble{pointer-events:none;}

    /* ── Mobile Controls ── */
    #mobile-controls{position:absolute;bottom:0;left:0;width:100%;height:200px;
      display:none;pointer-events:auto;}
    #joystick-zone{position:absolute;bottom:20px;left:20px;width:120px;height:120px;
      border-radius:50%;background:rgba(255,210,230,0.2);border:1.5px solid rgba(255,180,210,0.35);}
    #joystick-knob{position:absolute;width:48px;height:48px;border-radius:50%;
      background:rgba(220,140,180,0.6);border:1.5px solid rgba(255,210,230,0.5);
      top:50%;left:50%;transform:translate(-50%,-50%);}
    #action-btn{position:absolute;bottom:30px;right:30px;width:68px;height:68px;
      border-radius:50%;
      background:rgba(255,190,220,0.75);border:1.5px solid rgba(255,180,210,0.5);
      display:flex;align-items:center;justify-content:center;
      font-size:15px;font-weight:700;color:#5C2D5A;letter-spacing:0.5px;}

    @media(max-width:480px){
      #hud-crystals{top:10px;left:10px;padding:5px 10px 5px 8px;gap:4px;}
      .gem{width:15px;height:15px;}
      #crystal-label{font-size:10px;}
      #sound-toggle{top:10px;right:10px;padding:5px 10px;}
      #map-btn{top:10px;font-size:11px;padding:5px 10px;}
      #mobile-controls{height:180px;}
      #joystick-zone{width:100px;height:100px;bottom:16px;left:16px;}
      #joystick-knob{width:40px;height:40px;}
      #action-btn{width:58px;height:58px;font-size:13px;bottom:24px;right:24px;}
      #dialogue-body{font-size:14px;padding:10px 44px 4px 16px;}
    }
  </style>
</head>
<body>
<div id="grain"></div>
<canvas id="game-canvas"></canvas>
<div id="transition-overlay"></div>
<div id="island-banner"><h2 id="island-banner-name"></h2><p id="island-banner-sub"></p></div>
<div id="ui">
  <!-- Title Screen -->
  <div id="title-screen">
    <!-- Lantern SVG -->
    <svg id="title-lantern" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="22" y="18" width="20" height="28" rx="4" fill="#EBB21A" opacity="0.9"/>
      <rect x="26" y="14" width="12" height="6" rx="2" fill="#D4836A"/>
      <rect x="30" y="10" width="4" height="6" rx="1" fill="#4F4261"/>
      <ellipse cx="32" cy="32" rx="7" ry="9" fill="#FFF8DC" opacity="0.6"/>
      <rect x="22" y="44" width="20" height="4" rx="2" fill="#D4836A"/>
      <line x1="32" y1="48" x2="32" y2="54" stroke="#4F4261" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <h1>Lantern Isle<br>Guardian Star</h1>
    <div id="title-tagline">A Cozy Island Adventure</div>
    <p>Six islands. Six shrines. One lantern bearer.<br>Can you reawaken the Guardian Star?</p>
    <button id="start-btn">Begin Adventure</button>
    <button id="reset-btn">Start Over</button>
    <button id="dev-btn">Dev Mode</button>
  </div>

  <!-- Crystal Status Bar -->
  <div id="hud-crystals" style="display:none;">
    <div class="gem" id="gem0">
      <svg viewBox="0 0 18 18" fill="none"><polygon points="9,2 15,7 13,16 5,16 3,7" fill="#9B9AE2" stroke="#C6C3DC" stroke-width="1"/><polygon points="9,2 15,7 9,7" fill="#C6C3DC" opacity="0.5"/></svg>
    </div>
    <div class="gem" id="gem1">
      <svg viewBox="0 0 18 18" fill="none"><polygon points="9,2 15,7 13,16 5,16 3,7" fill="#9B9AE2" stroke="#C6C3DC" stroke-width="1"/><polygon points="9,2 15,7 9,7" fill="#C6C3DC" opacity="0.5"/></svg>
    </div>
    <div class="gem" id="gem2">
      <svg viewBox="0 0 18 18" fill="none"><polygon points="9,2 15,7 13,16 5,16 3,7" fill="#9B9AE2" stroke="#C6C3DC" stroke-width="1"/><polygon points="9,2 15,7 9,7" fill="#C6C3DC" opacity="0.5"/></svg>
    </div>
    <div class="gem" id="gem3">
      <svg viewBox="0 0 18 18" fill="none"><polygon points="9,2 15,7 13,16 5,16 3,7" fill="#9B9AE2" stroke="#C6C3DC" stroke-width="1"/><polygon points="9,2 15,7 9,7" fill="#C6C3DC" opacity="0.5"/></svg>
    </div>
    <div class="gem" id="gem4">
      <svg viewBox="0 0 18 18" fill="none"><polygon points="9,2 15,7 13,16 5,16 3,7" fill="#9B9AE2" stroke="#C6C3DC" stroke-width="1"/><polygon points="9,2 15,7 9,7" fill="#C6C3DC" opacity="0.5"/></svg>
    </div>
    <span id="crystal-label">0 / 5</span>
  </div>

  <!-- Sound Toggle -->
  <button id="sound-toggle" class="hud-btn" style="display:none;">
    <svg id="sound-icon" viewBox="0 0 20 20" fill="none" width="16" height="16">
      <path d="M4 7h3l4-3v12l-4-3H4V7z" fill="#9B6AB0"/>
      <path id="sound-waves" d="M13 7.5a3 3 0 010 5M15 5.5a6 6 0 010 9" stroke="#9B6AB0" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- Map Button -->
  <button id="map-btn" class="hud-btn" style="display:none;">
    <svg viewBox="0 0 20 20" fill="none" width="14" height="14">
      <path d="M2 4l5 2 6-2 5 2v12l-5-2-6 2-5-2V4z" stroke="#9B6AB0" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M7 6v12M13 4v12" stroke="#9B6AB0" stroke-width="1" opacity="0.5"/>
    </svg>
    Map
  </button>

  <div id="hud-compass" style="display:none;"><canvas id="compass-canvas" width="82" height="82"></canvas></div>

  <!-- Inventory -->
  <div id="inventory" style="display:none;">
    <div class="inv-slot">
      <!-- Lantern icon -->
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="7" y="7" width="10" height="12" rx="2" fill="#EBB21A" opacity="0.85"/>
        <rect x="9" y="5" width="6" height="3" rx="1" fill="#D4836A"/>
        <rect x="11" y="3" width="2" height="3" rx="0.5" fill="#4F4261"/>
        <ellipse cx="12" cy="13" rx="3" ry="4" fill="#FFF8DC" opacity="0.55"/>
        <rect x="7" y="17" width="10" height="2" rx="1" fill="#D4836A"/>
      </svg>
    </div>
    <div class="inv-slot" id="inv1"></div>
    <div class="inv-slot" id="inv2"></div>
  </div>

  <!-- Quest Tracker -->
  <div id="quest-tracker">
    <h4>
      <svg viewBox="0 0 14 14" fill="none" width="11" height="11">
        <rect x="2" y="1" width="10" height="12" rx="1.5" fill="none" stroke="#C4709A" stroke-width="1.2"/>
        <line x1="4" y1="5" x2="10" y2="5" stroke="#C4709A" stroke-width="1"/>
        <line x1="4" y1="7.5" x2="10" y2="7.5" stroke="#C4709A" stroke-width="1"/>
        <line x1="4" y1="10" x2="7" y2="10" stroke="#C4709A" stroke-width="1"/>
      </svg>
      Quests
    </h4>
    <ul id="quest-list"></ul>
  </div>

  <!-- Ability Bar -->
  <div id="ability-bar" style="display:none;">
    <div class="ability-slot" id="ab-pulse" title="Lantern Pulse [Space]" style="display:none;">
      <!-- pulse/radiate icon -->
      <svg viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="3" fill="#EBB21A"/>
        <circle cx="10" cy="10" r="6" stroke="#EBB21A" stroke-width="1" opacity="0.4"/>
        <circle cx="10" cy="10" r="9" stroke="#EBB21A" stroke-width="1" opacity="0.2"/>
      </svg>
      <span class="ability-key">Spc</span>
      <div class="ability-cooldown" style="transform:scaleY(0);"></div>
    </div>
    <div class="ability-slot" id="ab-sprint" title="Sprint [Shift]" style="display:none;">
      <!-- wind/sprint icon -->
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M4 10h12M4 7h8M4 13h8" stroke="#9B9AE2" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M14 7l3 3-3 3" stroke="#9B9AE2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="ability-key">Sft</span>
      <div class="ability-cooldown" style="transform:scaleY(0);"></div>
    </div>
  </div>

  <!-- Dialogue Box -->
  <div id="dialogue-box">
    <div id="dialogue-header">
      <div id="dialogue-speaker-icon">
        <svg viewBox="0 0 15 15" fill="none">
          <circle cx="7.5" cy="5" r="3" fill="#C4A0C0"/>
          <path d="M2 13c0-3 2.5-5 5.5-5s5.5 2 5.5 5" stroke="#C4A0C0" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <span id="dialogue-speaker">???</span>
    </div>
    <div id="dialogue-body" id="dialogue-text"></div>
    <div id="dialogue-continue">
      <svg viewBox="0 0 14 14" fill="none">
        <path d="M2 4l5 6 5-6" stroke="#C4709A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <!-- Map Screen -->
  <div id="map-screen">
    <div id="map-title">
      <svg viewBox="0 0 20 20" fill="none" width="20" height="20">
        <path d="M2 4l5 2 6-2 5 2v12l-5-2-6 2-5-2V4z" stroke="#7A3D6A" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M7 6v12M13 4v12" stroke="#7A3D6A" stroke-width="1" opacity="0.4"/>
      </svg>
      World Map
    </div>
    <canvas id="map-canvas" width="640" height="400"></canvas>
    <button id="close-map">Close</button>
  </div>

  <!-- Interact Prompt -->
  <div id="interact-prompt"><span id="interact-key">E</span><span id="interact-label">Interact</span></div>

  <!-- Win Screen -->
  <div id="win-screen">
    <canvas id="win-stars"></canvas>
    <div id="win-content">
      <h1>The Guardian Star<br>is Reawakened</h1>
      <p id="win-epilogue"></p>
      <button id="restart-btn">Play Again</button>
    </div>
  </div>

  <div id="restore-flash"></div>
</div>

<div id="mobile-controls" style="display:none;">
  <div id="joystick-zone"><div id="joystick-knob"></div></div>
  <div id="action-btn">E</div>
</div>
<script type="module" src="src/game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lantern Isle: Guardian Star</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script async src="https://vibej.am/2026/widget.js"></script>
  <style>
    /* ── Soft Watercolor Theme ── */
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#1a1228;overflow:hidden;font-family:'Cormorant Garamond',serif;width:100vw;height:100vh;}
    canvas{display:block;}
    #ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}

    /* ── Crystal Status Bar ── */
    #hud-crystals{
      position:absolute;top:14px;left:14px;display:flex;align-items:center;gap:5px;
      background:rgba(255,240,248,0.82);border:1.5px solid rgba(255,180,210,0.5);
      border-radius:24px;padding:6px 13px 6px 10px;pointer-events:auto;
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      box-shadow:0 2px 12px rgba(220,140,180,0.18);
    }
    .gem{width:18px;height:18px;display:flex;align-items:center;justify-content:center;opacity:0.25;transition:opacity 0.35s,filter 0.35s;}
    .gem.lit{opacity:1;filter:drop-shadow(0 0 5px rgba(180,120,200,0.8));}
    .gem svg{width:100%;height:100%;}
    #crystal-label{font-size:11px;font-weight:700;color:#9B6AB0;margin-left:5px;letter-spacing:0.3px;}

    /* ── HUD Buttons (sound + map) ── */
    .hud-btn{
      position:absolute;top:14px;
      background:rgba(255,240,248,0.82);border:1.5px solid rgba(255,180,210,0.5);
      border-radius:20px;padding:6px 14px;cursor:pointer;pointer-events:auto;
      display:flex;align-items:center;gap:6px;
      font-family:'Quicksand',sans-serif;font-size:12px;font-weight:700;color:#9B6AB0;
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      box-shadow:0 2px 12px rgba(220,140,180,0.18);
      transition:background 0.2s,box-shadow 0.2s;
    }
    .hud-btn:hover{background:rgba(255,228,242,0.95);box-shadow:0 4px 18px rgba(220,140,180,0.3);}
    .hud-btn svg{flex-shrink:0;}
    #sound-toggle{right:14px;}
    #map-btn{left:50%;transform:translateX(-50%);}
    #hud-compass{display:none!important;}

    /* ── Inventory ── */
    #inventory{position:absolute;right:14px;top:50%;transform:translateY(-50%);
      display:flex;flex-direction:column;gap:6px;pointer-events:auto;}
    .inv-slot{width:44px;height:44px;
      background:rgba(255,240,248,0.82);border:1.5px solid rgba(255,180,210,0.5);
      border-radius:14px;display:flex;align-items:center;justify-content:center;
      backdrop-filter:blur(10px);box-shadow:0 2px 10px rgba(220,140,180,0.15);}
    .inv-slot svg{width:24px;height:24px;}

    /* ── Quest Tracker ── */
    #quest-tracker{position:absolute;left:14px;top:50%;transform:translateY(-50%);
      background:rgba(255,240,248,0.85);border:1.5px solid rgba(255,180,210,0.45);
      border-radius:18px;padding:11px 15px;min-width:150px;max-width:200px;
      display:none;pointer-events:none;
      backdrop-filter:blur(10px);box-shadow:0 4px 18px rgba(220,140,180,0.2);}
    #quest-tracker h4{font-size:10px;font-weight:700;color:#C4709A;text-transform:uppercase;
      letter-spacing:0.8px;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
    #quest-tracker ul{list-style:none;padding:0;margin:0;}
    #quest-tracker li{font-size:11px;color:#7A5A7A;font-weight:600;padding:3px 0;
      display:flex;align-items:center;gap:5px;}
    #quest-tracker li::before{content:'';width:5px;height:5px;border-radius:50%;background:#D4A0C0;flex-shrink:0;}
    #quest-tracker li.done{opacity:0.38;text-decoration:line-through;}
    #quest-tracker li.done::before{background:#D4B8C8;}

    /* ── Dialogue Box ── */
    #dialogue-box{
      position:absolute;bottom:0;left:0;width:100%;
      background:rgba(255,242,250,0.94);border-top:2px solid rgba(255,180,210,0.5);
      display:none;pointer-events:auto;
      padding:0 0 16px 0;
      backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      box-shadow:0 -4px 24px rgba(220,140,180,0.18);
    }
    #dialogue-header{
      display:flex;align-items:center;gap:8px;
      padding:10px 18px 8px 18px;
      border-bottom:1px solid rgba(255,180,210,0.25);
    }
    #dialogue-speaker-icon{
      width:28px;height:28px;border-radius:50%;
      background:rgba(255,210,230,0.6);border:1.5px solid rgba(255,180,210,0.6);
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    #dialogue-speaker-icon svg{width:15px;height:15px;}
    #dialogue-speaker{
      font-size:12px;font-weight:700;color:#C4709A;letter-spacing:0.3px;
    }
    #dialogue-body{
      padding:12px 48px 4px 18px;
      font-size:15px;line-height:1.7;color:#5C3D5E;
    }
    #dialogue-continue{
      position:absolute;bottom:14px;right:18px;
      width:22px;height:22px;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;animation:bob 0.65s ease-in-out infinite alternate;
    }
    #dialogue-continue svg{width:14px;height:14px;}
    @keyframes bob{from{transform:translateY(0)}to{transform:translateY(4px)}}

    /* ── Ability Bar ── */
    #ability-bar{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
      display:flex;gap:8px;pointer-events:none;}
    .ability-slot{
      width:40px;height:40px;
      background:rgba(255,240,248,0.82);border:1.5px solid rgba(255,180,210,0.5);
      border-radius:12px;display:flex;align-items:center;justify-content:center;
      position:relative;overflow:hidden;
      backdrop-filter:blur(10px);box-shadow:0 2px 10px rgba(220,140,180,0.18);
    }
    .ability-slot svg{width:20px;height:20px;position:relative;z-index:1;}
    .ability-key{
      position:absolute;bottom:2px;right:3px;font-size:8px;font-weight:700;
      color:rgba(155,106,176,0.7);z-index:2;
    }
    .ability-cooldown{position:absolute;inset:0;background:rgba(220,170,210,0.45);
      border-radius:11px;transform-origin:bottom;transition:transform 0.1s;}

    /* ── Map Screen ── */
    #map-screen{position:absolute;inset:0;
      background:rgba(200,160,210,0.35);
      display:none;flex-direction:column;align-items:center;justify-content:center;
      pointer-events:auto;z-index:20;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
    #map-modal{
      background:rgba(255,243,250,0.96);
      border-radius:24px;
      box-shadow:0 8px 40px rgba(180,100,150,0.28);
      padding:22px 28px 18px;
      display:flex;flex-direction:column;align-items:center;gap:0;
      max-width:780px;width:90vw;
    }
    #map-title{
      font-size:20px;font-weight:700;color:#7A3D6A;margin-bottom:14px;
      letter-spacing:0.3px;display:flex;align-items:center;gap:8px;
    }
    #map-title svg{width:20px;height:20px;}
    #map-canvas{
      border:none;border-radius:16px;
      background:transparent;
    }
    #close-map{
      margin-top:14px;background:rgba(255,210,230,0.7);color:#7A3D6A;
      border:1.5px solid rgba(255,180,210,0.6);
      font-family:'Quicksand',sans-serif;font-size:14px;font-weight:700;
      padding:8px 28px;border-radius:20px;cursor:pointer;pointer-events:auto;
      box-shadow:0 2px 10px rgba(220,140,180,0.2);
      transition:background 0.2s,box-shadow 0.2s;
    }
    #close-map:hover{background:rgba(255,200,225,0.9);box-shadow:0 4px 16px rgba(220,140,180,0.35);}

    /* ── Title Screen (Golden-Hour Dusk) ── */
    #title-screen{position:absolute;inset:0;
      transition:opacity 0.35s ease;
      z-index:30;pointer-events:auto;overflow:hidden;
      width:100%;height:100%;}

    /* palette vars scoped to title screen */
    #title-screen{
      --periwinkle:#9B9AE2;--coral:#EB6259;--lavender:#C6C3DC;
      --gold:#EBB21A;--cream:#F0DEC2;--deep-plum:#4F4261;--sage:#6F7E4A;--pink:#F29FD7;
    }

    .ts-sky{
      position:absolute;inset:0;
      background:linear-gradient(to bottom,
        #2a1e3a 0%,#3a2858 10%,#4f4261 20%,#6a5a88 30%,
        #9b9ae2 42%,#b8b0d8 50%,#c6c3dc 57%,#d8c8c0 63%,
        #e8c890 70%,#ebb21a 76%,#e8c060 81%,#f0dec2 86%,
        #c8a870 91%,#a07860 95%,#6a5060 100%);
    }
    .ts-cloud{
      position:absolute;border-radius:50%;
      filter:blur(var(--blur));opacity:var(--op);background:var(--color);
      animation:tsCloudDrift var(--dur) ease-in-out infinite;
      animation-delay:var(--delay);
    }
    @keyframes tsCloudDrift{
      0%,100%{transform:translateX(0) scaleX(1);}
      50%{transform:translateX(var(--dx)) scaleX(var(--sx));}
    }
    .ts-sun-glow{
      position:absolute;bottom:37%;left:50%;transform:translateX(-50%);
      width:80px;height:80px;border-radius:50%;
      background:radial-gradient(circle,#fff8d8 0%,#ebb21a 35%,#e8a030 60%,transparent 82%);
      filter:blur(4px);animation:tsSunBreath 5s ease-in-out infinite;z-index:1;
    }
    .ts-sun-halo{
      position:absolute;bottom:30%;left:50%;transform:translateX(-50%);
      width:600px;height:200px;
      background:radial-gradient(ellipse at center bottom,
        rgba(235,178,26,0.4) 0%,rgba(235,178,26,0.2) 30%,
        rgba(240,222,194,0.1) 55%,transparent 72%);
      pointer-events:none;z-index:1;
    }
    @keyframes tsSunBreath{
      0%,100%{transform:translateX(-50%) scale(1);opacity:0.9;}
      50%{transform:translateX(-50%) scale(1.12);opacity:1;}
    }
    .ts-star{
      position:absolute;border-radius:50%;
      animation:tsTwinkle var(--dur) ease-in-out infinite;
      animation-delay:var(--delay);opacity:var(--op);
    }
    @keyframes tsTwinkle{
      0%,100%{opacity:var(--op);transform:scale(1);}
      50%{opacity:1;transform:scale(1.6);}
    }
    .ts-mountains-svg{position:absolute;left:0;bottom:0;width:100%;pointer-events:none;}
    .ts-water{
      position:absolute;bottom:0;left:0;right:0;height:36%;
      background:linear-gradient(to bottom,#9b9ae2 0%,#7878c8 10%,#5a5898 25%,#4f4261 45%,#382850 70%,#201830 100%);
      overflow:hidden;
    }
    .ts-water-reflection{
      position:absolute;top:0;left:50%;transform:translateX(-50%);
      width:200px;height:100%;
      background:linear-gradient(to bottom,rgba(235,178,26,0.5) 0%,rgba(235,178,26,0.28) 18%,rgba(155,154,226,0.2) 45%,transparent 80%);
      filter:blur(10px);animation:tsReflectWave 4s ease-in-out infinite;
    }
    @keyframes tsReflectWave{
      0%,100%{transform:translateX(-50%) scaleX(1);}
      33%{transform:translateX(-47%) scaleX(0.8);}
      66%{transform:translateX(-53%) scaleX(1.2);}
    }
    .ts-hero-lantern{
      position:absolute;top:8%;left:50%;transform:translateX(-50%);
      z-index:8;animation:tsLanternSway 5s ease-in-out infinite;transform-origin:top center;
    }
    @keyframes tsLanternSway{
      0%,100%{transform:translateX(-50%) rotate(-2.5deg);}
      50%{transform:translateX(-50%) rotate(2.5deg);}
    }
    .ts-lantern-glow-orb{
      position:absolute;top:6%;left:50%;transform:translateX(-50%);
      width:220px;height:220px;border-radius:50%;
      background:radial-gradient(circle,rgba(235,178,26,0.38) 0%,rgba(235,178,26,0.2) 35%,rgba(240,222,194,0.1) 60%,transparent 78%);
      filter:blur(18px);animation:tsGlowPulse 4s ease-in-out infinite;z-index:7;pointer-events:none;
    }
    @keyframes tsGlowPulse{
      0%,100%{opacity:0.8;transform:translateX(-50%) scale(1);}
      50%{opacity:1;transform:translateX(-50%) scale(1.15);}
    }
    .ts-crystal{
      position:absolute;
      animation:tsCrystalFloat var(--float-dur) ease-in-out infinite,tsCrystalSpin var(--spin-dur) linear infinite;
      animation-delay:var(--delay),var(--spin-delay);
      filter:drop-shadow(0 0 6px rgba(155,154,226,0.85));
      z-index:9;opacity:0;animation-fill-mode:forwards;
    }
    @keyframes tsCrystalFloat{
      0%{opacity:0;transform:translateY(30px) translateX(0);}
      15%{opacity:var(--op);}
      50%{transform:translateY(var(--rise)) translateX(var(--sway));opacity:var(--op);}
      85%{opacity:calc(var(--op)*0.6);}
      100%{opacity:0;transform:translateY(calc(var(--rise)*2)) translateX(calc(var(--sway)*1.5));}
    }
    @keyframes tsCrystalSpin{0%{rotate:0deg;}100%{rotate:360deg;}}
    .ts-vignette{
      position:absolute;inset:0;
      background:radial-gradient(ellipse at center 55%,transparent 35%,rgba(8,4,18,0.72) 100%);
      pointer-events:none;z-index:6;
    }
    .ts-title-area{
      position:absolute;top:50%;left:50%;
      transform:translate(-50%,-38%);
      text-align:center;z-index:12;
    }
    .ts-eyebrow{
      font-family:'Quicksand',sans-serif;font-weight:300;font-size:10px;
      letter-spacing:7px;text-transform:uppercase;
      color:rgba(198,195,220,0.65);margin-bottom:10px;
    }
    .ts-title-main{
      font-family:'Cormorant Garamond',serif;font-weight:600;font-size:72px;
      line-height:0.95;color:#f0dec2;letter-spacing:4px;
      text-shadow:0 0 30px rgba(235,178,26,0.85),0 0 60px rgba(235,178,26,0.45),0 3px 10px rgba(0,0,0,0.55);
      animation:tsTitlePulse 4s ease-in-out infinite;
    }
    @keyframes tsTitlePulse{
      0%,100%{text-shadow:0 0 24px rgba(235,178,26,0.75),0 0 50px rgba(235,178,26,0.35),0 3px 10px rgba(0,0,0,0.55);}
      50%{text-shadow:0 0 45px rgba(235,178,26,1),0 0 85px rgba(235,178,26,0.6),0 3px 10px rgba(0,0,0,0.55);}
    }
    .ts-title-sub{
      font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;font-size:20px;
      color:rgba(198,195,220,0.9);letter-spacing:3px;margin-top:6px;
      text-shadow:0 0 18px rgba(155,154,226,0.75);
    }
    .ts-divider{
      margin:18px auto;display:flex;align-items:center;justify-content:center;gap:10px;
    }
    .ts-divider-line{
      width:60px;height:1px;
      background:linear-gradient(to right,transparent,rgba(155,154,226,0.7),transparent);
    }
    .ts-divider-diamond{
      width:8px;height:8px;background:rgba(155,154,226,0.95);transform:rotate(45deg);
      box-shadow:0 0 10px rgba(155,154,226,0.9),0 0 20px rgba(155,154,226,0.5);
      animation:tsDiamondPulse 2.5s ease-in-out infinite;
    }
    @keyframes tsDiamondPulse{
      0%,100%{box-shadow:0 0 10px rgba(155,154,226,0.9),0 0 20px rgba(155,154,226,0.5);transform:rotate(45deg) scale(1);}
      50%{box-shadow:0 0 18px rgba(155,154,226,1),0 0 35px rgba(155,154,226,0.8);transform:rotate(45deg) scale(1.3);}
    }
    .ts-btn-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:2px;}
    #start-btn{
      font-family:'Quicksand',sans-serif;font-weight:500;font-size:13px;
      letter-spacing:4px;text-transform:uppercase;
      color:#2a1a08;
      background:linear-gradient(135deg,#f5e070 0%,#ebb21a 45%,#c88a10 100%);
      border:none;padding:14px 50px;border-radius:2px;cursor:pointer;
      box-shadow:0 0 30px rgba(235,178,26,0.45),0 4px 18px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,255,200,0.4);
      transition:all 0.3s ease;position:relative;overflow:hidden;z-index:1;
    }
    #start-btn::before{
      content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);
      transition:left 0.45s ease;
    }
    #start-btn:hover::before{left:100%;}
    #start-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 0 55px rgba(235,178,26,0.75),0 6px 22px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,200,0.5);
    }
    #dev-btn{
      font-family:'Quicksand',sans-serif;font-weight:400;font-size:10px;
      letter-spacing:4px;text-transform:uppercase;
      color:rgba(198,195,220,0.7);background:transparent;
      border:1px solid rgba(155,154,226,0.35);
      padding:9px 30px;border-radius:2px;cursor:pointer;transition:all 0.3s ease;z-index:1;
    }
    #dev-btn:hover{color:rgba(198,195,220,1);border-color:rgba(155,154,226,0.7);background:rgba(155,154,226,0.1);}
    .ts-jam-badge{
      position:absolute;top:18px;right:20px;
      font-family:'Quicksand',sans-serif;font-size:10px;font-weight:500;
      letter-spacing:2px;text-transform:uppercase;
      color:rgba(198,195,220,0.6);border:1px solid rgba(155,154,226,0.28);
      padding:6px 14px;border-radius:2px;z-index:20;text-decoration:none;
    }
    .ts-jam-badge:hover{color:rgba(198,195,220,1);border-color:rgba(155,154,226,0.6);}

    /* ── Island Banner ── */
    #island-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.88);
      background:rgba(255,242,250,0.94);border:1.5px solid rgba(255,180,210,0.55);
      border-radius:22px;padding:16px 38px;text-align:center;pointer-events:none;z-index:36;
      opacity:0;transition:opacity 0.3s ease,transform 0.3s ease;
      box-shadow:0 8px 32px rgba(220,140,180,0.28);backdrop-filter:blur(14px);}
    #island-banner.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
    #island-banner h2{font-size:24px;font-weight:700;color:#5C2D5A;margin:0;}
    #island-banner p{font-size:12px;color:#C4709A;font-weight:600;margin-top:5px;letter-spacing:0.5px;}



    /* ── Win Screen ── */
    #win-screen{position:absolute;inset:0;
      background:linear-gradient(160deg,#fce8f5 0%,#e8d0f0 50%,#d4b8e4 100%);
      display:none;flex-direction:column;align-items:center;justify-content:center;
      z-index:40;pointer-events:auto;overflow:hidden;}
    #win-stars{position:absolute;inset:0;pointer-events:none;}
    #win-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;
      padding:20px;text-align:center;}
    #win-screen h1{font-size:34px;font-weight:700;color:#5C2D5A;text-align:center;
      text-shadow:0 0 28px rgba(220,140,200,0.5),0 2px 6px rgba(255,255,255,0.4);line-height:1.35;}
    #win-screen p{color:#7A5A7A;margin-top:14px;font-size:15px;max-width:440px;line-height:1.85;}
    #restart-btn{margin-top:28px;
      background:linear-gradient(135deg,rgba(255,190,220,0.95),rgba(220,160,210,0.95));
      color:#5C2D5A;border:1.5px solid rgba(255,180,210,0.7);
      font-family:'Quicksand',sans-serif;font-size:16px;font-weight:700;
      padding:12px 36px;border-radius:28px;cursor:pointer;
      box-shadow:0 4px 20px rgba(220,140,180,0.4);}
    #restart-btn:hover{transform:scale(1.05);}

    /* ── Misc ── */
    #restore-flash{position:fixed;inset:0;background:white;opacity:0;pointer-events:none;z-index:45;
      transition:opacity 0.12s ease;}
    #grain{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0.04;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:200px 200px;}
    #transition-overlay{position:fixed;inset:0;background:#f0e0f0;opacity:0;pointer-events:none;
      z-index:35;transition:opacity 0.35s ease;}
    .thought-bubble{pointer-events:none;}

    /* ── Mobile Controls ── */
    #mobile-controls{position:absolute;bottom:0;left:0;width:100%;height:200px;
      display:none;pointer-events:auto;}
    #joystick-zone{position:absolute;bottom:20px;left:20px;width:120px;height:120px;
      border-radius:50%;background:rgba(255,210,230,0.2);border:1.5px solid rgba(255,180,210,0.35);}
    #joystick-knob{position:absolute;width:48px;height:48px;border-radius:50%;
      background:rgba(220,140,180,0.6);border:1.5px solid rgba(255,210,230,0.5);
      top:50%;left:50%;transform:translate(-50%,-50%);}
    #action-btn{position:absolute;bottom:30px;right:30px;width:68px;height:68px;
      border-radius:50%;
      background:rgba(255,190,220,0.75);border:1.5px solid rgba(255,180,210,0.5);

<script type="module" src="src/game.js"></script>
<script>
// Title screen star/cloud/crystal generation
(function(){
  // Stars
  const starsEl = document.getElementById('ts-stars');
  if(starsEl){ for(let i=0;i<65;i++){
    const s=document.createElement('div'); s.className='ts-star';
    const sz=Math.random()*2+0.5, op=0.15+Math.random()*0.55;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*48}%;background:${Math.random()>0.5?'#c6c3dc':'white'};--dur:${2+Math.random()*5}s;--delay:${Math.random()*5}s;--op:${op};opacity:${op};`;
    starsEl.appendChild(s);
  }}

  // Clouds
  const cloudsEl = document.getElementById('ts-clouds');
  const cloudSpecs=[
    {left:'8%', top:'14%',w:180,h:55, blur:22,color:'rgba(155,154,226,0.18)',dur:'12s',delay:'0s', dx:'10px',sx:'1.05'},
    {left:'28%',top:'10%',w:240,h:65, blur:28,color:'rgba(198,195,220,0.16)',dur:'16s',delay:'3s', dx:'8px', sx:'1.08'},
    {left:'55%',top:'8%', w:200,h:50, blur:20,color:'rgba(155,154,226,0.2)', dur:'14s',delay:'1s', dx:'-6px',sx:'1.04'},
    {left:'72%',top:'13%',w:160,h:45, blur:18,color:'rgba(240,222,194,0.18)',dur:'18s',delay:'5s', dx:'12px',sx:'1.06'},
    {left:'15%',top:'22%',w:280,h:70, blur:30,color:'rgba(198,195,220,0.14)',dur:'20s',delay:'2s', dx:'-8px',sx:'1.1'},
    {left:'60%',top:'20%',w:220,h:60, blur:25,color:'rgba(235,178,26,0.12)', dur:'15s',delay:'7s', dx:'6px', sx:'1.05'},
    {left:'38%',top:'28%',w:320,h:80, blur:35,color:'rgba(198,195,220,0.15)',dur:'22s',delay:'4s', dx:'-10px',sx:'1.12'},
  ];
  if(cloudsEl) cloudSpecs.forEach(c=>{
    const el=document.createElement('div'); el.className='ts-cloud';
    el.style.cssText=`left:${c.left};top:${c.top};width:${c.w}px;height:${c.h}px;--blur:${c.blur}px;--op:1;--color:${c.color};--dur:${c.dur};--delay:${c.delay};--dx:${c.dx};--sx:${c.sx};position:absolute;z-index:2;`;
    cloudsEl.appendChild(el);
  });

  // Crystals
  const crystalsEl = document.getElementById('ts-crystals');
  const shardTypes=[
    {id:'shard-p1',w:14,h:38},{id:'shard-p2',w:28,h:22},
    {id:'shard-p3',w:16,h:30},{id:'shard-p4',w:18,h:20},
  ];
  const crystalPositions=[
    {left:'12%',top:'55%'},{left:'18%',top:'38%'},{left:'24%',top:'62%'},
    {left:'72%',top:'52%'},{left:'78%',top:'40%'},{left:'82%',top:'65%'},
    {left:'35%',top:'70%'},{left:'62%',top:'68%'},{left:'8%', top:'45%'},
    {left:'88%',top:'48%'},{left:'45%',top:'72%'},{left:'55%',top:'66%'},
    {left:'28%',top:'44%'},{left:'68%',top:'42%'},{left:'15%',top:'72%'},
    {left:'85%',top:'58%'},
  ];
  if(crystalsEl) crystalPositions.forEach((pos,i)=>{
    const type=shardTypes[i%shardTypes.length];
    const scale=0.6+Math.random()*1.0;
    const w=Math.round(type.w*scale), h=Math.round(type.h*scale);
    const dur=9+Math.random()*12, spinDur=12+Math.random()*20;
    const op=0.5+Math.random()*0.45;
    const rise=-(40+Math.random()*80), sway=(Math.random()-0.5)*50;
    const delay=Math.random()*dur;
    const el=document.createElement('div'); el.className='ts-crystal';
    el.style.cssText=`left:${pos.left};top:${pos.top};--float-dur:${dur}s;--spin-dur:${spinDur}s;--delay:${delay}s;--spin-delay:0s;--op:${op};--rise:${rise}px;--sway:${sway}px;animation-delay:${delay}s,0s;`;
    el.innerHTML=`<svg width="${w}" height="${h}" viewBox="0 0 ${type.w} ${type.h}"><use href="#${type.id}"/></svg>`;
    crystalsEl.appendChild(el);
  });
})();
</script>
